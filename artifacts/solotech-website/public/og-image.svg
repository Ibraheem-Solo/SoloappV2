<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </linearGradient>
    <linearGradient id="orb1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" id="orb1" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb2" x1="800" y1="200" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <ellipse cx="200" cy="200" rx="300" ry="300" fill="#7B2FBE" fill-opacity="0.25" filter="url(#blur1)"/>
  <ellipse cx="1050" cy="430" rx="280" ry="280" fill="#2563EB" fill-opacity="0.2" filter="url(#blur2)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Badge pill -->
  <rect x="80" y="155" width="270" height="36" rx="18" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="215" y="179" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="white" fill-opacity="0.7" text-anchor="middle">⚡ Based in The Gambia</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-2">We Build Digital</text>
  <text x="80" y="360" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="url(#textGrad)" letter-spacing="-2">Experiences</text>

  <!-- Sub headline -->
  <text x="80" y="420" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="white" fill-opacity="0.6">Web Design · Branding · Social Media · Digital Marketing</text>

  <!-- Divider -->
  <line x1="80" y1="460" x2="500" y2="460" stroke="white" stroke-opacity="0.15" stroke-width="1"/>

  <!-- URL -->
  <text x="80" y="490" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="white" fill-opacity="0.45">solotechdigital.com</text>

  <!-- Stats on right -->
  <rect x="760" y="200" width="360" height="240" rx="20" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="940" y="260" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle">120+</text>
  <text x="940" y="292" font-family="Inter, system-ui, sans-serif" font-size="16" fill="white" fill-opacity="0.5" text-anchor="middle">Projects Delivered</text>
  <line x1="800" y1="320" x2="1080" y2="320" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="870" y="370" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="url(#textGrad)" text-anchor="middle">40+</text>
  <text x="870" y="395" font-family="Inter, system-ui, sans-serif" font-size="13" fill="white" fill-opacity="0.5" text-anchor="middle">Happy Clients</text>
  <text x="1010" y="370" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="url(#textGrad)" text-anchor="middle">5★</text>
  <text x="1010" y="395" font-family="Inter, system-ui, sans-serif" font-size="13" fill="white" fill-opacity="0.5" text-anchor="middle">Client Rating</text>
</svg>
