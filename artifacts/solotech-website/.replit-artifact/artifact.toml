kind = "web"
previewPath = "/"
title = "Solotech Digital LLC"
version = "1.0.0"
id = "artifacts/solotech-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23237

[services.development]
run = "pnpm --filter @workspace/solotech-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solotech-website", "run", "build" ]
publicDir = "artifacts/solotech-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23237"
BASE_PATH = "/"
